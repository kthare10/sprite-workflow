sites: [
  "KBOX",
  "KBYX",
  "KENX",
  "KLGX",
  "KTLX",
  "KVNX",
  "PAHG",
#  "KYUX",
]       # Example
splits: ["train", "test"]

windows:
  - name: "1mo"
    enabled: true
#  - name: "3mo"
#    enabled: true
#  - name: "6mo"
#    enabled: true
#  - name: "12mo"
#    enabled: true
#  - name: "24mo"
#    enabled: true
#  - name: "48mo"
#    enabled: true
#  - name: "1q"
#    enabled: false
#  - name: "1y"
#    enabled: false

scan:
  # Choose one: prefer explicit start/end; otherwise use backfill_months; defaults to 24 months when omitted
  start: "2022-02-01"   # optional
  end:   "2022-03-01"   # optional
  backfill_months: 24   # optional

freeze:
  datasource: "s3"       # "mtarchive" or "s3"
  freeze_lag_days: 3
  missing_ratio_tol:
      train: 0.25
      test: 0.85

fl:
  server_addr: "127.0.0.1:8080"
  rounds: 50
  local_steps: 2
  clients_concurrency: 4
  min_clients_to_start: 2

slurm:
  partition: "uri-gpu"
  gpus: 1
  cpus: 8
  time: "7-00:00:00"

orchestrator:
  poll_interval_sec: 10
  max_retries: 1

raw_layout: "site/split/day"  # raw_store/{SITE}/{train|test}/{YYYYMMDD}/*.nc

preprocessor:
  enabled: true
  sequence_length: 16
  gap_minutes: 10
  normalization: "no-normalization"
  precip_range: "precip-min:0.0_precip-max:128"

model_compare:
  # MCT web service endpoint (optional; if unset, runs local comparison only)
  # endpoint: "http://localhost:8000/api/compare"
  target_accuracy: 0.8   # accuracy threshold for convergence analysis
